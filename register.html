<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoomSync - Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="register-container">
        <h1>RoomSync</h1>
        <p>Create your account</p>

        <form onsubmit="return registerUser()">
            <input type="text" id="username" placeholder="Username" required>
            <br><br>

            <input type="password" id="password" placeholder="Password" required>
            <br><br>

            <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
            <br><br>

            <input type="number" id="budget" placeholder="Monthly Budget ($)" required>
            <br><br>

            <input type="text" id="location" placeholder="Preferred Location" required>
            <br><br>

            <label for="cleanliness">Cleanliness Level:</label>
            <select id="cleanliness" required>
                <option value="">Select</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
            <br><br>

            <button type="submit" class="btn">Create Account</button>
        </form>
        
        <p style="text-align: center; margin-top: 20px;">
            Already have an account? <a href="login.html">Login here</a>
        </p>
    </div>

    <script>
        function registerUser() {
            // Get form values
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const budget = document.getElementById('budget').value;
            const location = document.getElementById('location').value.trim();
            const cleanliness = document.getElementById('cleanliness').value;

            // Validation
            if (password !== confirmPassword) {
                alert("❌ Passwords do not match!");
                return false;
            }

            if (password.length < 6) {
                alert("⚠️ Password must be at least 6 characters.");
                return false;
            }

            if (budget <= 0) {
                alert("💰 Please enter a valid budget.");
                return false;
            }

            if (cleanliness === "") {
                alert("🧼 Please select cleanliness level.");
                return false;
            }

            // Create user object
            const user = {
                username: username,
                password: password,
                budget: budget,
                location: location,
                cleanliness: cleanliness
            };

            // Save to localStorage
            localStorage.setItem("roomsync_user", JSON.stringify(user));
            
            console.log("✅ User saved:", user);
            alert(`✅ Account created for ${username}!\n\nRedirecting to login...`);
            
            // Redirect to login
            window.location.href = "login.html";
            return false;
        }
    </script>
</body>
</html>
