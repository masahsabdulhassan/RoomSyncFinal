<script>
function registerUser() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const budget = document.getElementById('budget').value;
    const location = document.getElementById('location').value.trim();
    const cleanliness = document.getElementById('cleanliness').value;

    // Validation
    if (!username || !password || !confirmPassword || !budget || !location || !cleanliness) {
        alert("Please fill out all fields.");
        return false;
    }

    if (password !== confirmPassword) {
        alert("❌ Passwords do not match!");
        return false;
    }

    if (password.length < 6) {
        alert("⚠️ Password must be at least 6 characters.");
        return false;
    }

    if (budget <= 0) {
        alert("💰 Please enter a valid budget.");
        return false;
    }

    // Get existing users (IMPORTANT FIX)
    let users = JSON.parse(localStorage.getItem("users")) || [];

    // Check if username exists
    let exists = users.find(u => u.username === username);

    if (exists) {
        alert("⚠️ Username already exists!");
        return false;
    }

    // Create new user
    const user = {
        username,
        password,
        budget,
        location,
        cleanliness
    };

    users.push(user);

    // Save back to storage
    localStorage.setItem("users", JSON.stringify(users));

    console.log("✅ User saved:", user);

    alert(`Account created for ${username}!`);
    window.location.href = "login.html";

    return false;
}
</script>
