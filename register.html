<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoomSync - Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="register-container">
        <h1>RoomSync</h1>
        <p>Create your account</p>

        <form onsubmit="return registerUser()">
            <!-- Username -->
            <input type="text" id="username" placeholder="Username" required>
            <br><br>

            <!-- Password -->
            <input type="password" id="password" placeholder="Password" required>
            <br><br>

            <!-- Confirm Password Box -->
            <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
            <br><br>

            <!-- Budget -->
            <input type="number" id="budget" placeholder="Monthly Budget ($)" required>
            <br><br>

            <!-- Location -->
            <input type="text" id="location" placeholder="Preferred Location" required>
            <br><br>

            <!-- Cleanliness Level -->
            <label for="cleanliness">Cleanliness Level:</label>
            <select id="cleanliness" required>
                <option value="">Select</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
            <br><br>

            <!-- Submit Button -->
            <button type="submit" class="btn">Create Account</button>
        </form>
        
        <!-- Link to login page if they already have an account -->
        <p style="text-align: center; margin-top: 20px;">
            Already have an account? <a href="login.html">Login here</a>
        </p>
    </div>

    <script>
        function registerUser() {
            // Get form values
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const budget = document.getElementById('budget').value;
            const location = document.getElementById('location').value.trim();
            const cleanliness = document.getElementById('cleanliness').value;

            // Check if passwords match
            if (password !== confirmPassword) {
                alert("❌ Passwords do not match! Please re-enter your password.");
                return false;
            }

            // Check password length
            if (password.length < 6) {
                alert("⚠️ Password must be at least 6 characters long.");
                return false;
            }

            // Check budget
            if (budget <= 0) {
                alert("💰 Please enter a valid monthly budget.");
                return false;
            }

            // Check cleanliness selected
            if (cleanliness === "") {
                alert("🧼 Please select your cleanliness level.");
                return false;
            }

            // ✅ SAVE USER DATA to localStorage (connects with login page)
            const userData = {
                username: username,
                password: password,  // In real app, hash this!
                budget: budget,
                location: location,
                cleanliness: cleanliness,
                registeredAt: new Date().toISOString()
            };

            // Store user in localStorage
            localStorage.setItem('roomsync_user', JSON.stringify(userData));
            
            // Optional: Store just credentials for quick login check
            localStorage.setItem('roomsync_username', username);
            localStorage.setItem('roomsync_password', password);

            // Show success message
            alert(`✅ Welcome to RoomSync, ${username}!\n\nYour account has been created successfully!\n\nYou will now be redirected to the login page.`);

            // ✅ REDIRECT TO LOGIN PAGE (connects your pages!)
            window.location.href = "login.html";
            
            return false; // Prevent actual form submission since we're redirecting
        }
    </script>

</body>
</html>
