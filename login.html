<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoomSync - Login</title>
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 320px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2c7be5;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #1a5fd0;
        }

        .register-link {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
        }

        .register-link a {
            color: #2c7be5;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="login-container">
    <h2>Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="loginUser()">Login</button>

    <div class="register-link">
        Don't have an account? <a href="register.html">Register</a>
    </div>
</div>

<script>
function loginUser() {
    let user = document.getElementById("username").value.trim();
    let pass = document.getElementById("password").value.trim();

    if (user === "" || pass === "") {
        alert("Please fill all fields");
        return;
    }

    // get stored users
    let users = JSON.parse(localStorage.getItem("roomsync_users")) || [];

    // find matching user
    let foundUser = users.find(u => u.username === user && u.password === pass);

    if (!foundUser) {
        alert("❌ No account found or wrong password!");
        return;
    }

    alert("Login successful!");

    // save session
    localStorage.setItem("roomsync_loggedIn", JSON.stringify(foundUser));

    // redirect to dashboard (change if needed)
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
