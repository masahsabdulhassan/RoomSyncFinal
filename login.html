<script>
function loginUser() {
    let typedUsername = document.getElementById('username').value.trim();
    let typedPassword = document.getElementById('password').value;

    let users = JSON.parse(localStorage.getItem("users")) || [];

    console.log("Users in system:", users);

    if (users.length === 0) {
        alert("❌ No accounts found. Please register first.");
        window.location.href = "register.html";
        return;
    }

    let match = users.find(user =>
        user.username === typedUsername &&
        user.password === typedPassword
    );

    if (match) {
        alert("✅ Login successful! Welcome " + typedUsername);

        localStorage.setItem("loggedInUser", typedUsername);

        window.location.href = "dashboard.html";
        return true;
    } else {
        alert("❌ Incorrect username or password");
        return false;
    }
}

// Optional: debug helper
window.onload = function() {
    console.log("Login page loaded");
    console.log("Stored users:", JSON.parse(localStorage.getItem("users")));
};
</script>
