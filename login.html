<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoomSync - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">
    <h1>RoomSync</h1>
    <p>Login to your account</p>
    
    <div id="errorMessage" style="color: red; text-align: center; margin-bottom: 15px; display: none;"></div>
    
    <form id="loginForm" onsubmit="return loginUser()">
        <input type="text" id="username" placeholder="Username" required>
        <br><br>
        <input type="password" id="password" placeholder="Password" required>
        <br><br>
        <button type="submit" class="btn">Login</button>
    </form>
    
    <p style="text-align: center; margin-top: 20px;">
        Don't have an account? <a href="register.html">Register here</a>
    </p>
</div>

<script>
function loginUser() {
    // Get values from the form
    let username = document.getElementById('username').value;
    let password = document.getElementById('password').value;
    
    // Get saved registration data
    let savedUsername = localStorage.getItem('reg_username');
    let savedPassword = localStorage.getItem('reg_password');
    
    // Debug: See what's saved (check console with F12)
    console.log("=== LOGIN DEBUG ===");
    console.log("You entered:", username, password);
    console.log("Saved username:", savedUsername);
    console.log("Saved password:", savedPassword);
    
    // Check if any account exists
    if (!savedUsername) {
        alert("❌ No account found! Please register first.");
        window.location.href = "register.html";
        return false;
    }
    
    // Check if credentials match
    if (username === savedUsername && password === savedPassword) {
        alert("✅ Login successful! Welcome " + username);
        // You can redirect to your dashboard/homepage
        // window.location.href = "dashboard.html";
        return true;
    } else {
        alert("❌ Wrong username or password!\n\nTry:\nUsername: " + savedUsername + "\nPassword: " + savedPassword);
        return false;
    }
}
</script>

</body>
</html>
